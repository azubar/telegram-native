name: Build and Release Telegram Native

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: telegram_native_win64.dll
            binary_name: telegram_native.dll
            msvc_arch: x64
            msvc_generator_arch: x64
            vcpkg_triplet: x64-windows-static

          - os: windows-latest
            target: i686-pc-windows-msvc
            artifact_name: telegram_native_win32.dll
            binary_name: telegram_native.dll
            msvc_arch: x86
            msvc_generator_arch: Win32
            vcpkg_triplet: x86-windows-static

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: telegram_native_linux64.so
            binary_name: libtelegram_native.so
            msvc_arch: none
            msvc_generator_arch: none
            vcpkg_triplet: none

          - os: ubuntu-latest
            target: i686-unknown-linux-gnu
            artifact_name: telegram_native_linux32.so
            binary_name: libtelegram_native.so
            msvc_arch: none
            msvc_generator_arch: none
            vcpkg_triplet: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup MSVC environment (Windows)
        if: contains(matrix.os, 'windows')
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Install Windows dependencies
        if: contains(matrix.os, 'windows')
        shell: pwsh
        run: |
          choco install gperf -y --no-progress
          vcpkg install zlib:${{ matrix.vcpkg_triplet }} openssl:${{ matrix.vcpkg_triplet }}
          $vdir = "C:/vcpkg/installed/${{ matrix.vcpkg_triplet }}/lib"
          if (Test-Path "$vdir/zlibstatic.lib") { Copy-Item "$vdir/zlibstatic.lib" "$vdir/zlib.lib" -Force }
          if (Test-Path "$vdir/zlib.lib") { Copy-Item "$vdir/zlib.lib" "$vdir/zlibstatic.lib" -Force }
          if (Test-Path "$vdir/libssl.lib") { Copy-Item "$vdir/libssl.lib" "$vdir/ssl.lib" -Force }
          if (Test-Path "$vdir/ssl.lib") { Copy-Item "$vdir/ssl.lib" "$vdir/libssl.lib" -Force }
          if (Test-Path "$vdir/libcrypto.lib") { Copy-Item "$vdir/libcrypto.lib" "$vdir/crypto.lib" -Force }
          if (Test-Path "$vdir/crypto.lib") { Copy-Item "$vdir/crypto.lib" "$vdir/libcrypto.lib" -Force }

      - name: Install Linux build dependencies
        if: contains(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          if [[ "${{ matrix.target }}" == i686* ]]; then
            sudo dpkg --add-architecture i386
            sudo apt-get update
            sudo apt-get install -y gperf gcc-multilib g++-multilib libssl-dev:i386 zlib1g-dev:i386
          else
            sudo apt-get install -y gperf libssl-dev zlib1g-dev
          fi

      - name: Cache TDLib
        id: cache-tdlib
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/tdlib-install
          key: tdlib-1.8.65-v3-${{ matrix.target }}

      - name: Build TDLib (Windows)
        if: steps.cache-tdlib.outputs.cache-hit != 'true' && contains(matrix.os, 'windows')
        shell: pwsh
        run: |
          git clone https://github.com/tdlib/td.git td-src
          cd td-src
          git checkout 022d60202e446ad1287b9fb68e687c8a0760788b
          mkdir build
          cd build
          cmake -A ${{ matrix.msvc_generator_arch }} -DCMAKE_BUILD_TYPE=Release -DTD_ENABLE_JNI=OFF -DOPENSSL_USE_STATIC_LIBS=TRUE -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=${{ matrix.vcpkg_triplet }} -DCMAKE_INSTALL_PREFIX="$env:GITHUB_WORKSPACE\tdlib-install" ..
          cmake --build . --config Release --target install --parallel 2

      - name: Build TDLib (Linux)
        if: steps.cache-tdlib.outputs.cache-hit != 'true' && contains(matrix.os, 'ubuntu')
        shell: bash
        run: |
          EXTRA_FLAGS=""
          if [[ "${{ matrix.target }}" == i686* ]]; then
            EXTRA_FLAGS="-DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32 -DCMAKE_LIBRARY_PATH=/usr/lib/i386-linux-gnu -DOPENSSL_CRYPTO_LIBRARY=/usr/lib/i386-linux-gnu/libcrypto.so -DOPENSSL_SSL_LIBRARY=/usr/lib/i386-linux-gnu/libssl.so -DZLIB_LIBRARY=/usr/lib/i386-linux-gnu/libz.so"
          fi

          git clone https://github.com/tdlib/td.git td-src
          cd td-src
          git checkout 022d60202e446ad1287b9fb68e687c8a0760788b
          mkdir build
          cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_POSITION_INDEPENDENT_CODE=ON -DTD_ENABLE_JNI=OFF $EXTRA_FLAGS -DCMAKE_INSTALL_PREFIX="$GITHUB_WORKSPACE/tdlib-install" ..
          cmake --build . --config Release --target install -j2

      - name: Build release component
        shell: pwsh
        run: cargo build --release --target ${{ matrix.target }}
        env:
          TD_LIB_DIR: ${{ github.workspace }}/tdlib-install/lib
          VCPKG_LIB_DIR: C:/vcpkg/installed/${{ matrix.vcpkg_triplet }}/lib
          TD_STATIC: 1

      - name: Prepare artifact
        shell: pwsh
        run: |
          $src = "target/${{ matrix.target }}/release/${{ matrix.binary_name }}"
          if (-not (Test-Path $src)) {
            $src = "target/release/${{ matrix.binary_name }}"
          }
          Copy-Item -Path $src -Destination "./${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./${{ matrix.artifact_name }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create 1C Component Package (AddIn.zip)
        run: |
          zip -j AddIn.zip ./artifacts/* MANIFEST.xml README.md LICENSE_1_0.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.1.1
          name: Release v2.1.1
          files: |
            AddIn.zip
            ./artifacts/telegram_native_win64.dll
            ./artifacts/telegram_native_win32.dll
            ./artifacts/telegram_native_linux64.so
            ./artifacts/telegram_native_linux32.so
          draft: false
          prerelease: false
          generate_release_notes: true
